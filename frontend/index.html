<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | AI-Powered Academic Scheduling</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;800;900&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'exo': ['Exo 2', 'sans-serif'],
                        'sans': ['Outfit', 'sans-serif']
                    },
                    colors: {
                        atlas: {
                            teal: '#2dd4bf',
                            purple: '#2e1065',
                            indigo: '#4f46e5'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            background-color: #0a0f1e;
            color: white;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #2dd4bf 0%, #4f46e5 100%);
            border-radius: 10px;
        }

        /* ── Glassmorphism layers ── */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .glass-heavy {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(45, 212, 191, 0.08) 0%, transparent 50%, rgba(79, 70, 229, 0.06) 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: rgba(45, 212, 191, 0.3);
            box-shadow:
                0 20px 60px -15px rgba(45, 212, 191, 0.15),
                0 0 40px -10px rgba(79, 70, 229, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* ── Animated gradient text ── */
        .text-gradient {
            background: linear-gradient(135deg, #2dd4bf 0%, #818cf8 40%, #c084fc 70%, #2dd4bf 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer-text 4s linear infinite;
        }

        @keyframes shimmer-text {
            0% {
                background-position: 0% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        /* ── Glowing border animation ── */
        .glow-border {
            position: relative;
        }

        .glow-border::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            background: linear-gradient(135deg, #2dd4bf, #4f46e5, #c084fc, #2dd4bf);
            background-size: 300% 300%;
            animation: glow-rotate 6s linear infinite;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .glow-border:hover::after {
            opacity: 1;
        }

        @keyframes glow-rotate {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ── Nav link underline ── */
        .nav-link {
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #2dd4bf, #4f46e5);
            transition: width 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .nav-link.active::after,
        .nav-link:hover::after {
            width: 100%;
        }

        .text-atlas-teal {
            color: #2dd4bf;
        }

        /* ── Inputs ── */
        .custom-input {
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(45, 212, 191, 0.15);
            color: white;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
        }

        .custom-input:focus {
            border-color: #2dd4bf;
            outline: none;
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.12), 0 0 20px -5px rgba(45, 212, 191, 0.2);
        }

        /* ── Page Transition ── */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            z-index: 9999;
            transform: translateY(100%);
            pointer-events: none;
        }

        /* ── Timetable hover rows ── */
        tr.hover-row {
            transition: background 0.2s ease;
        }

        tr.hover-row:hover td {
            background-color: rgba(45, 212, 191, 0.03);
        }

        /* ── Blob animations ── */
        @keyframes blob {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(30px, -50px) scale(1.1);
            }

            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }

            75% {
                transform: translate(20px, -20px) scale(1.05);
            }
        }

        .animate-blob {
            animation: blob 8s ease-in-out infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        /* ── Pulse ring for feature icons ── */
        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(45, 212, 191, 0.4);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(45, 212, 191, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(45, 212, 191, 0);
            }
        }

        .pulse-icon:hover {
            animation: pulse-ring 1.5s ease-out infinite;
        }

        /* ── Grid background pattern ── */
        .grid-bg {
            background-image:
                linear-gradient(rgba(45, 212, 191, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(45, 212, 191, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ── Stat counter glow ── */
        .stat-glow {
            text-shadow: 0 0 30px rgba(45, 212, 191, 0.5), 0 0 60px rgba(45, 212, 191, 0.2);
        }

        /* ── Smooth btn ── */
        .btn-primary {
            background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 50%, #0d9488 100%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 4px 20px -5px rgba(45, 212, 191, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 30px -5px rgba(45, 212, 191, 0.5);
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(45, 212, 191, 0.3);
            transform: translateY(-2px);
        }

        /* ── Loader ── */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: #2dd4bf;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Drag-Drop ── */
        .tt-tile[draggable="true"] {
            cursor: grab;
        }

        .tt-tile[draggable="true"]:active {
            cursor: grabbing;
        }

        .tt-tile.dragging {
            opacity: 0.35;
            transform: scale(0.92);
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.4);
        }

        td.drag-over {
            background: rgba(45, 212, 191, 0.08) !important;
            box-shadow: inset 0 0 0 2px rgba(45, 212, 191, 0.4);
            border-radius: 8px;
        }

        @keyframes drop-flash {
            0% {
                box-shadow: inset 0 0 0 2px rgba(52, 211, 153, 0.8);
                background: rgba(52, 211, 153, 0.12);
            }

            100% {
                box-shadow: inset 0 0 0 0 transparent;
                background: transparent;
            }
        }

        td.drop-success {
            animation: drop-flash 0.6s ease-out forwards;
        }

        @keyframes conflict-pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3);
            }

            50% {
                box-shadow: 0 0 12px 2px rgba(239, 68, 68, 0.4);
            }
        }

        /* ── Light Mode ── */
        body.light-mode {
            background-color: #f1f5f9;
            color: #1e293b;
        }

        /* Glass layers */
        .light-mode .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border-color: rgba(0, 0, 0, 0.08);
        }

        .light-mode .glass-heavy {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(24px);
            border-color: rgba(0, 0, 0, 0.1);
        }

        .light-mode .glass-card {
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.06);
        }

        .light-mode .glass-card:hover {
            border-color: rgba(13, 148, 136, 0.35);
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(13, 148, 136, 0.1);
            transform: translateY(-8px) scale(1.01);
        }

        .light-mode .glass-card::before {
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.06) 0%, transparent 50%, rgba(79, 70, 229, 0.04) 100%);
        }

        /* Gradient text — deeper for white backgrounds */
        .light-mode .text-gradient {
            background: linear-gradient(135deg, #0d9488 0%, #4f46e5 40%, #7c3aed 70%, #0d9488 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Buttons */
        .light-mode .btn-primary {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 50%, #115e59 100%);
            box-shadow: 0 4px 20px -5px rgba(13, 148, 136, 0.35);
            color: white !important;
        }

        .light-mode .btn-primary:hover {
            box-shadow: 0 8px 30px -5px rgba(13, 148, 136, 0.45);
        }

        .light-mode .btn-primary .text-white,
        .light-mode .btn-primary {
            color: white !important;
            -webkit-text-fill-color: white;
        }

        .light-mode .btn-glass {
            background: rgba(255, 255, 255, 0.6);
            border-color: rgba(0, 0, 0, 0.1);
            color: #334155;
        }

        .light-mode .btn-glass:hover {
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(13, 148, 136, 0.3);
        }

        /* Inputs */
        .light-mode .custom-input {
            background: #f8fafc;
            border-color: rgba(0, 0, 0, 0.12);
            color: #1e293b;
        }

        .light-mode .custom-input:focus {
            border-color: #0d9488;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12), 0 0 15px -5px rgba(13, 148, 136, 0.15);
        }

        .light-mode select {
            color: #1e293b;
        }

        .light-mode option {
            background: #f8fafc;
            color: #1e293b;
        }

        /* Stats glow */
        .light-mode .stat-glow {
            text-shadow: 0 0 20px rgba(13, 148, 136, 0.3), 0 0 40px rgba(13, 148, 136, 0.1);
        }

        .light-mode .text-atlas-teal {
            color: #0d9488;
        }

        /* Nav */
        .light-mode .nav-link {
            color: #475569;
        }

        .light-mode .nav-link.active {
            color: #0d9488;
        }

        .light-mode .nav-link::after {
            background: linear-gradient(90deg, #0d9488, #4f46e5);
        }

        .light-mode .glow-border::after {
            background: linear-gradient(135deg, #0d9488, #4f46e5, #7c3aed, #0d9488);
        }

        /* Text colors */
        .light-mode .text-slate-400 {
            color: #64748b;
        }

        .light-mode .text-slate-500 {
            color: #475569;
        }

        .light-mode .text-slate-600 {
            color: #334155;
        }

        /* Text colors — exclude elements on gradient backgrounds */
        .light-mode .text-white {
            color: #0f172a;
        }

        /* Keep text white on gradient/colored backgrounds */
        .light-mode .btn-primary,
        .light-mode .btn-primary *,
        .light-mode .btn-primary .text-white,
        .light-mode button[class*="bg-gradient"],
        .light-mode button[class*="bg-gradient"] *,
        .light-mode .bg-gradient-to-r,
        .light-mode .bg-gradient-to-r * {
            color: white !important;
            -webkit-text-fill-color: white !important;
        }

        .light-mode .font-bold.text-white {
            color: #0f172a;
        }

        .light-mode h1,
        .light-mode h2,
        .light-mode h3 {
            color: #0f172a;
        }

        .light-mode p {
            color: #475569;
        }

        /* Section overlays — fix the "Why use this" gradient */
        .light-mode .from-transparent.via-slate-900\/50.to-transparent {
            background: linear-gradient(to bottom, transparent, rgba(241, 245, 249, 0.6), transparent) !important;
        }

        .light-mode .from-atlas-teal\/\[0\.04\] {
            --tw-gradient-from: rgba(13, 148, 136, 0.03);
        }

        /* Sidebar tab buttons — active gradient tab keeps white text */
        .light-mode .shadow-lg.shadow-atlas-teal\/10 {
            box-shadow: 0 4px 15px -3px rgba(13, 148, 136, 0.25);
        }

        /* Non-active tab in sidebar */
        .light-mode button.bg-white\/\[0\.03\] {
            background: rgba(0, 0, 0, 0.03);
            color: #475569;
        }

        .light-mode button.bg-white\/\[0\.03\]:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        /* Feature cards icon backgrounds */
        .light-mode [class*="bg-"][class*="/10"] {
            opacity: 0.9;
        }

        /* ADMIN badge keep visible */
        .light-mode .bg-atlas-teal\/\[0\.06\] {
            background: rgba(13, 148, 136, 0.1);
        }

        .light-mode .border-atlas-teal\/15 {
            border-color: rgba(13, 148, 136, 0.2);
        }

        /* Timetable */
        .light-mode tr.hover-row:hover td {
            background-color: rgba(13, 148, 136, 0.04);
        }

        .light-mode .bg-black\/20 {
            background: rgba(0, 0, 0, 0.04);
        }

        .light-mode th {
            color: #475569 !important;
        }

        /* Backgrounds */
        .light-mode #app {
            background: #f1f5f9;
        }

        .light-mode .bg-\[\#0a0f1e\] {
            background: #f1f5f9;
        }

        .light-mode .bg-\[\#0c1122\]\/80 {
            background: rgba(255, 255, 255, 0.88);
        }

        .light-mode .bg-\[\#0c1122\]\/90 {
            background: rgba(255, 255, 255, 0.94);
        }

        .light-mode .page-transition {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }

        /* Borders */
        .light-mode .border-white\/\[0\.04\] {
            border-color: rgba(0, 0, 0, 0.06);
        }

        .light-mode .border-white\/\[0\.03\] {
            border-color: rgba(0, 0, 0, 0.05);
        }

        .light-mode .border-white\/5 {
            border-color: rgba(0, 0, 0, 0.06);
        }

        .light-mode .border-white\/10 {
            border-color: rgba(0, 0, 0, 0.08);
        }

        .light-mode .border-atlas-teal\/20 {
            border-color: rgba(13, 148, 136, 0.2);
        }

        .light-mode .border-atlas-teal\/50 {
            border-color: rgba(13, 148, 136, 0.3);
        }

        /* Sidebar data cards */
        .light-mode .border-l-2.border-atlas-teal\/50 {
            border-left-color: rgba(13, 148, 136, 0.5);
        }

        .light-mode .border-l-2.border-purple-500\/50 {
            border-left-color: rgba(139, 92, 246, 0.5);
        }

        /* Background decorative elements */
        .light-mode .animate-blob {
            opacity: 0.3;
        }

        .light-mode .grid-bg {
            background-image: linear-gradient(rgba(13, 148, 136, 0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(13, 148, 136, 0.06) 1px, transparent 1px);
        }

        /* Scrollbar */
        .light-mode ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #0d9488 0%, #4f46e5 100%);
        }

        .light-mode ::-webkit-scrollbar-track {
            background: #e2e8f0;
        }

        /* Badges & pills */
        .light-mode .bg-atlas-teal\/10 {
            background: rgba(13, 148, 136, 0.1);
        }

        .light-mode .bg-atlas-teal\/\[0\.06\] {
            background: rgba(13, 148, 136, 0.08);
        }

        .light-mode .bg-white\/\[0\.04\] {
            background: rgba(0, 0, 0, 0.03);
        }

        .light-mode .bg-white\/\[0\.03\] {
            background: rgba(0, 0, 0, 0.02);
        }

        .light-mode .bg-white\/\[0\.08\] {
            background: rgba(0, 0, 0, 0.05);
        }

        /* Login overlay — light mode */
        .light-mode #login-overlay {
            background: rgba(241, 245, 249, 0.85);
            backdrop-filter: blur(20px);
        }

        .light-mode #login-overlay .glass-heavy {
            background: rgba(255, 255, 255, 0.92);
            border-color: rgba(0, 0, 0, 0.1);
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.05);
        }

        .light-mode #login-overlay .absolute.h-\[2px\] {
            opacity: 0.8;
        }

        .light-mode #login-overlay .absolute.bg-atlas-teal\/5,
        .light-mode #login-overlay .absolute.bg-indigo-500\/5 {
            opacity: 0.4;
        }

        .light-mode #login-overlay h2 {
            color: #0d9488 !important;
        }

        .light-mode #login-overlay .text-white {
            color: #0f172a;
        }

        .light-mode #login-overlay p,
        .light-mode #login-overlay .text-slate-500 {
            color: #64748b;
        }

        .light-mode #login-overlay .text-atlas-teal {
            color: #0d9488;
        }

        .light-mode #login-overlay label,
        .light-mode #login-overlay .text-\[10px\] {
            color: #475569 !important;
        }

        .light-mode #login-overlay .custom-input {
            background: #f8fafc;
            border-color: rgba(0, 0, 0, 0.12);
            color: #1e293b;
        }

        .light-mode #login-overlay .custom-input:focus {
            border-color: #0d9488;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
        }

        .light-mode #login-overlay .custom-input::placeholder {
            color: #94a3b8;
        }

        .light-mode #login-overlay .btn-primary {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 50%, #115e59 100%);
            color: white !important;
            -webkit-text-fill-color: white !important;
        }

        .light-mode #login-overlay button:not(.btn-primary) {
            color: #64748b;
        }

        .light-mode #login-overlay button:not(.btn-primary):hover {
            color: #0d9488;
        }

        /* Other modals stay dark */
        .light-mode #add-modal .text-white,
        .light-mode #diag-modal .text-white,
        .light-mode #pin-modal .text-white {
            color: white;
        }

        .light-mode #add-modal .glass-heavy,
        .light-mode #diag-modal .glass-heavy,
        .light-mode #pin-modal .glass-heavy {
            background: rgba(15, 23, 42, 0.85);
        }

        .light-mode #add-modal h3,
        .light-mode #diag-modal h3,
        .light-mode #pin-modal h3 {
            color: white;
        }

        .light-mode #add-modal .custom-input,
        .light-mode #pin-modal .custom-input,
        .light-mode #pin-modal select {
            background: rgba(10, 15, 30, 0.8);
            color: white;
            border-color: rgba(45, 212, 191, 0.15);
        }

        /* Theme toggle pill */
        .theme-toggle {
            width: 44px;
            height: 24px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            border-color: rgba(45, 212, 191, 0.4);
        }

        .theme-toggle .toggle-knob {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2dd4bf, #14b8a6);
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;

    <script>
        const API_URL = 'http://127.0.0.1:8000/api';

        const TIME_SLOTS = [
            { id: 0, label: "07:30 - 08:30" },
            { id: 1, label: "08:30 - 09:30" },
            { id: 2, label: "10:00 - 11:00" },
            { id: 3, label: "11:00 - 12:00" },
            { id: 4, label: "12:00 - 01:00" },
            { id: 5, label: "01:00 - 02:00" },
            { id: 6, label: "02:00 - 03:00" },
            { id: 7, label: "03:00 - 04:00" }
        ];

        const DAY_LABELS = { MON: 'Monday', TUE: 'Tuesday', WED: 'Wednesday', THU: 'Thursday', FRI: 'Friday' };

        // ═══ AUTH ═══
        const auth = {
            token: null, user: null,

            openLogin: () => {
                document.getElementById('login-overlay').classList.remove('hidden');
                gsap.from("#login-overlay > div", { y: 40, opacity: 0, scale: 0.95, duration: 0.5, ease: "back.out(1.4)" });
            },
            closeLogin: () => {
                gsap.to("#login-overlay > div", {
                    y: 20, opacity: 0, scale: 0.95, duration: 0.25, ease: "power2.in",
                    onComplete: () => document.getElementById('login-overlay').classList.add('hidden')
                });
            },

            login: async (e) => {
                e.preventDefault();
                const u = document.getElementById('login-user').value;
                const p = document.getElementById('login-pass').value;
                try {
                    const res = await fetch(`${API_URL}/login/`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
                    if (!res.ok) throw new Error("Invalid Credentials");
                    const data = await res.json();
                    auth.token = data.token; auth.user = data;
                    auth.closeLogin(); auth.updateNav(); router.navigate('dashboard');
                } catch (err) { alert("Login Failed: " + err.message); }
            },

            logout: () => { auth.token = null; auth.user = null; auth.updateNav(); router.navigate('home'); },

            updateNav: () => {
                const c = document.getElementById('nav-auth-container');
                if (auth.user) {
                    const role = auth.user.is_admin ? "ADMIN" : "FACULTY";
                    c.innerHTML = `<div class="flex items-center gap-4">
                        <span class="text-[10px] font-mono text-atlas-teal bg-atlas-teal/10 px-2.5 py-1 rounded-full border border-atlas-teal/20 tracking-wider">${role}</span>
                        <button onclick="auth.logout()" class="text-sm text-slate-500 hover:text-atlas-teal transition-colors">Logout</button>
                    </div>`;
                } else {
                    c.innerHTML = `<button onclick="auth.openLogin()" class="btn-primary text-white px-6 py-2.5 rounded-full text-sm font-medium">Login</button>`;
                }
            }
        };

        // ═══ ROUTER ═══
        const router = {
            navigate: (pageId) => {
                if (pageId === 'dashboard' && !auth.user) { auth.openLogin(); return; }
                document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
                const nav = document.getElementById(`nav-${pageId}`);
                if (nav) nav.classList.add('active');
                const tl = gsap.timeline();
                tl.to("#pageTransition", { y: "0%", duration: 0.4, ease: "power3.inOut" })
                    .call(() => { app.render(pageId); if (pageId === 'home') window.scrollTo(0, 0); })
                    .to("#pageTransition", { y: "-100%", duration: 0.4, ease: "power3.inOut" });
            }
        };

        // ═══ APP CONTROLLER ═══
        const app = {
            state: { subjects: [], teachers: [], batches: [], rooms: [], currentDept: null, currentBatch: null, variants: [], currentVariant: null, pins: [], conflicts: [], unavailabilities: [] },
            activeTab: 'subjects',

            render: (pageId) => {
                const c = document.getElementById('app');
                if (pageId === 'home') {
                    c.className = "pt-20 w-full h-full overflow-y-auto block";
                    c.innerHTML = views.home();
                    app.animateHome();
                } else if (pageId === 'dashboard') {
                    c.className = "pt-20 w-full h-screen flex flex-col overflow-hidden";
                    c.innerHTML = views.dashboard();
                    app.initDashboard();
                }
            },

            animateHome: () => {
                gsap.from(".hero-content > *", { y: 60, opacity: 0, duration: 1.2, stagger: 0.12, ease: "power3.out" });
                gsap.from(".hero-visual", { x: 80, opacity: 0, duration: 1.4, delay: 0.2, ease: "power3.out" });
                gsap.to(".floating-card", { y: -18, duration: 2.5, repeat: -1, yoyo: true, stagger: { each: 0.6, from: "random" }, ease: "sine.inOut" });

                // Stats counter animation
                gsap.utils.toArray('.stat-number').forEach(el => {
                    const target = parseInt(el.dataset.target);
                    gsap.fromTo(el, { textContent: 0 }, {
                        textContent: target, duration: 2, delay: 0.8, ease: "power2.out", snap: { textContent: 1 },
                        scrollTrigger: { trigger: el, start: "top 90%" }
                    });
                });

                // Feature cards stagger
                gsap.utils.toArray('.feature-card').forEach((card, i) => {
                    gsap.from(card, {
                        scrollTrigger: { trigger: card, start: "top 88%" },
                        y: 60, opacity: 0, scale: 0.95, duration: 0.8, delay: i * 0.1, ease: "power3.out"
                    });
                });
            },

            initDashboard: async () => {
                if (auth.user.is_admin) {
                    app.renderTimetable([]);
                    document.getElementById('admin-header').classList.remove('hidden');
                    document.getElementById('admin-actions').classList.remove('hidden');
                    try {
                        const res = await fetch(`${API_URL}/departments/`, { headers: { 'Authorization': `Token ${auth.token}` } });
                        const depts = await res.json();
                        const sel = document.getElementById('dept-select');
                        sel.innerHTML = '<option value="" disabled selected>Select Department</option>';
                        depts.forEach(d => sel.innerHTML += `<option value="${d.id}">${d.name}</option>`);
                        if (depts.length === 1) { sel.value = depts[0].id; await app.onDeptChange(); }
                    } catch (err) { console.error('Failed to load departments:', err); }
                } else {
                    app.state.currentDept = auth.user.department_id;
                    try {
                        const sRes = await fetch(`${API_URL}/slots/?department=${auth.user.department_id}&teacher=${auth.user.teacher_id}`, { headers: { 'Authorization': `Token ${auth.token}` } });
                        const slots = await sRes.json();
                        app.renderTimetable(slots);
                        const name = auth.user.teacher_name || auth.user.username;
                        document.getElementById('table-title').textContent = `${name}'s Weekly Schedule`;
                        document.getElementById('status-text').textContent = slots.length > 0 ? 'PUBLISHED' : 'NO SCHEDULE';
                        document.getElementById('status-text').className = slots.length > 0
                            ? 'text-[10px] font-mono text-green-400 bg-green-400/[0.06] px-3 py-1.5 rounded-full border border-green-400/15 tracking-wider'
                            : 'text-[10px] font-mono text-slate-500 bg-slate-500/[0.06] px-3 py-1.5 rounded-full border border-slate-500/15 tracking-wider';
                        // PDF download for faculty
                        if (slots.length > 0) {
                            const ttRes = await fetch(`${API_URL}/timetables/?department=${auth.user.department_id}&status=PUBLISHED`, { headers: { 'Authorization': `Token ${auth.token}` } });
                            const tts = await ttRes.json();
                            if (tts.length > 0) {
                                const dlBtn = document.getElementById('pdf-download-btn');
                                if (dlBtn) {
                                    dlBtn.classList.remove('hidden');
                                    dlBtn.onclick = () => window.open(`${API_URL}/timetables/${tts[0].id}/pdf/?teacher=${auth.user.teacher_id}&token=${auth.token}`, '_blank');
                                }
                            }
                        }
                    } catch (err) {
                        console.error('Failed to load faculty timetable:', err);
                        app.renderTimetable([]);
                        document.getElementById('table-title').textContent = 'No published schedule yet';
                    }
                }
            },

            onDeptChange: async () => {
                const deptId = document.getElementById('dept-select').value;
                if (!deptId) return;
                app.state.currentDept = deptId; app.state.currentBatch = null; app.state.currentVariant = null; app.state.variants = [];
                try {
                    const [bRes, tRes, subRes, ttRes, pinRes, rRes] = await Promise.all([
                        fetch(`${API_URL}/batches/`, { headers: { 'Authorization': `Token ${auth.token}` } }),
                        fetch(`${API_URL}/teachers/`, { headers: { 'Authorization': `Token ${auth.token}` } }),
                        fetch(`${API_URL}/subjects/`, { headers: { 'Authorization': `Token ${auth.token}` } }),
                        fetch(`${API_URL}/timetables/?department=${deptId}`, { headers: { 'Authorization': `Token ${auth.token}` } }),
                        fetch(`${API_URL}/pinned-slots/?department=${deptId}`, { headers: { 'Authorization': `Token ${auth.token}` } }),
                        fetch(`${API_URL}/rooms/`, { headers: { 'Authorization': `Token ${auth.token}` } })
                    ]);
                    const [batches, teachers, subjects, timetables, pins, rooms] = await Promise.all([bRes.json(), tRes.json(), subRes.json(), ttRes.json(), pinRes.json(), rRes.json()]);
                    app.state.batches = batches.filter(x => x.department == deptId);
                    app.state.teachers = teachers.filter(x => x.department == deptId);
                    app.state.subjects = subjects.filter(x => x.department == deptId);
                    app.state.rooms = rooms;
                    app.state.variants = timetables;
                    app.state.pins = pins;
                    const mainBatches = app.state.batches.filter(b => !b.parent_batch);
                    const batchSel = document.getElementById('batch-select');
                    batchSel.innerHTML = '<option value="" disabled selected>Select Batch</option>';
                    mainBatches.forEach(b => batchSel.innerHTML += `<option value="${b.id}">${b.name}</option>`);
                    app.renderDataManager(); app.renderTimetable([]);
                    app.renderVariantSelector();
                    document.getElementById('table-title').textContent = 'Select a batch to view schedule';
                    document.getElementById('status-text').textContent = 'ADMIN';
                } catch (err) { console.error('Dept change error:', err); alert('Error loading department data.'); }
            },

            onBatchChange: async () => {
                const batchId = document.getElementById('batch-select').value;
                app.state.currentBatch = batchId || null;
                app.renderDataManager(); await app.refreshTimetable();
            },

            refreshTimetable: async () => {
                const deptId = app.state.currentDept; if (!deptId) return;
                if (!app.state.currentBatch) {
                    app.renderTimetable([]);
                    document.getElementById('table-title').textContent = 'Select a batch to view schedule'; return;
                }
                try {
                    let url = `${API_URL}/slots/?department=${deptId}&batch=${app.state.currentBatch}`;
                    if (app.state.currentVariant) url += `&timetable=${app.state.currentVariant}`;
                    const sRes = await fetch(url, { headers: { 'Authorization': `Token ${auth.token}` } });
                    const slots = await sRes.json(); app.renderTimetable(slots);
                    const batchName = app.state.batches.find(b => b.id == app.state.currentBatch)?.name || 'Batch';
                    const variant = app.state.variants.find(v => v.id == app.state.currentVariant);
                    const varLabel = variant ? ` — Variant ${variant.variant_number}` : '';
                    document.getElementById('table-title').textContent = `Schedule — ${batchName}${varLabel}`;
                    const statusEl = document.getElementById('status-text');
                    if (variant) {
                        statusEl.textContent = variant.status;
                        statusEl.className = variant.status === 'PUBLISHED'
                            ? 'text-[10px] font-mono text-green-400 bg-green-400/[0.06] px-3 py-1.5 rounded-full border border-green-400/15 tracking-wider'
                            : 'text-[10px] font-mono text-amber-400 bg-amber-400/[0.06] px-3 py-1.5 rounded-full border border-amber-400/15 tracking-wider';
                    } else {
                        statusEl.textContent = 'ADMIN';
                        statusEl.className = 'text-[10px] font-mono text-atlas-teal bg-atlas-teal/[0.06] px-3 py-1.5 rounded-full border border-atlas-teal/15 tracking-wider';
                    }
                } catch (err) { console.error('Refresh timetable error:', err); }

                // Fetch conflicts
                if (app.state.currentVariant) {
                    try {
                        const cRes = await fetch(`${API_URL}/timetables/${app.state.currentVariant}/conflicts/`, { headers: { 'Authorization': `Token ${auth.token}` } });
                        const cData = await cRes.json();
                        app.state.conflicts = cData.conflicts || [];
                        if (app.state.conflicts.length > 0) app.highlightConflicts();
                    } catch (e) { app.state.conflicts = []; }
                } else { app.state.conflicts = []; }
            },

            refreshData: async () => {
                const deptId = auth.user.is_admin ? document.getElementById('dept-select').value : auth.user.department_id;
                if (!deptId) return; app.state.currentDept = deptId;
                if (auth.user.is_admin) {
                    const [bRes, tRes, subRes, ttRes, pinRes, rRes] = await Promise.all([
                        fetch(`${API_URL}/batches/`, { headers: { 'Authorization': `Token ${auth.token}` } }),
                        fetch(`${API_URL}/teachers/`, { headers: { 'Authorization': `Token ${auth.token}` } }),
                        fetch(`${API_URL}/subjects/`, { headers: { 'Authorization': `Token ${auth.token}` } }),
                        fetch(`${API_URL}/timetables/?department=${deptId}`, { headers: { 'Authorization': `Token ${auth.token}` } }),
                        fetch(`${API_URL}/pinned-slots/?department=${deptId}`, { headers: { 'Authorization': `Token ${auth.token}` } }),
                        fetch(`${API_URL}/rooms/`, { headers: { 'Authorization': `Token ${auth.token}` } })
                    ]);
                    const [batches, teachers, subjects, timetables, pins, rooms] = await Promise.all([bRes.json(), tRes.json(), subRes.json(), ttRes.json(), pinRes.json(), rRes.json()]);
                    app.state.batches = batches.filter(x => x.department == deptId);
                    app.state.teachers = teachers.filter(x => x.department == deptId);
                    app.state.subjects = subjects.filter(x => x.department == deptId);
                    app.state.rooms = rooms;
                    app.state.variants = timetables;
                    app.state.pins = pins;
                    const mainBatches = app.state.batches.filter(b => !b.parent_batch);
                    const batchSel = document.getElementById('batch-select');
                    const prevBatch = app.state.currentBatch;
                    batchSel.innerHTML = '<option value="" disabled selected>Select Batch</option>';
                    mainBatches.forEach(b => { const sel = b.id == prevBatch ? 'selected' : ''; batchSel.innerHTML += `<option value="${b.id}" ${sel}>${b.name}</option>`; });
                    app.renderDataManager(); app.renderVariantSelector(); await app.refreshTimetable();
                }
            },

            renderDataManager: () => {
                const container = document.getElementById('data-manager'); container.innerHTML = '';
                const btnSub = document.getElementById('btn-tab-sub');
                const btnTea = document.getElementById('btn-tab-tea');

                if (app.activeTab === 'subjects') {
                    btnSub.className = "flex-1 py-2.5 text-sm font-bold bg-gradient-to-r from-atlas-teal to-atlas-indigo text-white rounded-lg shadow-lg shadow-atlas-teal/10 transition-all";
                    btnTea.className = "flex-1 py-2.5 text-sm font-bold bg-white/[0.03] hover:bg-white/[0.06] text-slate-400 rounded-lg border border-white/5 transition-all";

                    let filteredSubjects = app.state.subjects;
                    if (app.state.currentBatch) {
                        const batchId = parseInt(app.state.currentBatch);
                        const subBatchIds = app.state.batches.filter(b => b.parent_batch == batchId).map(b => b.id);
                        filteredSubjects = app.state.subjects.filter(s => [batchId, ...subBatchIds].includes(s.batch));
                    }
                    if (filteredSubjects.length === 0) return container.innerHTML = '<div class="text-center text-slate-600 mt-10 text-sm">No subjects found. Select a batch above.</div>';

                    filteredSubjects.forEach(sub => {
                        let bOpts = `<option value="">-- Batch --</option>`;
                        app.state.batches.forEach(b => bOpts += `<option value="${b.id}" ${sub.batch == b.id ? 'selected' : ''}>${b.name}</option>`);
                        let tOpts = `<option value="">-- Faculty --</option>`;
                        app.state.teachers.forEach(t => tOpts += `<option value="${t.id}" ${sub.teacher == t.id ? 'selected' : ''}>${t.name}</option>`);

                        container.innerHTML += `
                            <div class="glass p-3.5 rounded-xl border-l-2 border-atlas-teal/50 mb-2 hover:bg-white/[0.02] transition-all duration-300 hover:border-atlas-teal">
                                <div class="flex justify-between mb-2">
                                    <span class="font-bold text-white text-sm">${sub.name}</span>
                                    <button onclick="app.deleteItem('subjects', ${sub.id})" class="text-slate-700 hover:text-red-400 transition-colors text-xs"><i class="fas fa-trash"></i></button>
                                </div>
                                <div class="grid grid-cols-2 gap-2 mb-2">
                                    <select class="custom-input text-xs py-1.5 sub-batch" data-id="${sub.id}">${bOpts}</select>
                                    <select class="custom-input text-xs py-1.5 sub-teacher" data-id="${sub.id}">${tOpts}</select>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Lecs/Wk:</span>
                                    <input type="number" min="1" value="${sub.weekly_lectures}" class="custom-input text-xs py-1 w-14 sub-lectures" data-id="${sub.id}">
                                </div>
                            </div>`;
                    });
                } else {
                    btnTea.className = "flex-1 py-2.5 text-sm font-bold bg-gradient-to-r from-pink-500 to-purple-600 text-white rounded-lg shadow-lg shadow-purple-500/10 transition-all";
                    btnSub.className = "flex-1 py-2.5 text-sm font-bold bg-white/[0.03] hover:bg-white/[0.06] text-slate-400 rounded-lg border border-white/5 transition-all";

                    if (app.state.teachers.length === 0) return container.innerHTML = '<div class="text-center text-slate-600 mt-10 text-sm">No faculty found.</div>';

                    app.state.teachers.forEach(t => {
                        const timeOpts = TIME_SLOTS.map(ts => `<option value="${ts.id}" ${t.preferred_start_slot == ts.id ? 'selected' : ''}>${ts.label}</option>`).join('');
                        const endOpts = TIME_SLOTS.map(ts => `<option value="${ts.id}" ${t.preferred_end_slot == ts.id ? 'selected' : ''}>${ts.label}</option>`).join('');
                        container.innerHTML += `
                            <div class="glass p-3.5 rounded-xl border-l-2 border-purple-500/50 mb-2 hover:bg-white/[0.02] transition-all duration-300 hover:border-purple-400">
                                <div class="flex justify-between mb-2">
                                    <span class="font-bold text-white text-sm">${t.name}</span>
                                    <div class="flex items-center gap-2">
                                        <button onclick="app.openAvailabilityGrid(${t.id})" class="text-slate-600 hover:text-emerald-400 transition-colors text-xs" title="Availability Grid"><i class="fas fa-calendar-alt"></i></button>
                                        <button onclick="app.deleteItem('teachers', ${t.id})" class="text-slate-700 hover:text-red-400 transition-colors text-xs"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                                <div class="flex gap-2 items-center text-xs mb-2">
                                    <span class="text-slate-500 font-bold text-[10px] tracking-wider">AVAIL:</span>
                                    <select class="custom-input py-1.5 w-28 t-start" data-id="${t.id}">${timeOpts}</select>
                                    <span class="text-slate-600">→</span>
                                    <select class="custom-input py-1.5 w-28 t-end" data-id="${t.id}">${endOpts}</select>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Max/Day:</span>
                                    <input type="number" min="1" max="8" value="${t.max_classes_per_day}" class="custom-input text-xs py-1 w-14 t-maxday" data-id="${t.id}">
                                </div>
                            </div>`;
                    });
                }
            },

            renderTimetable: (slots) => {
                const tbody = document.getElementById('timetable-body'); tbody.innerHTML = '';
                const matrix = Array.from({ length: 8 }, () => Array.from({ length: 5 }, () => []));
                const dayMap = { 'MON': 0, 'TUE': 1, 'WED': 2, 'THU': 3, 'FRI': 4 };
                const dayKeys = ['MON', 'TUE', 'WED', 'THU', 'FRI'];
                const isAdmin = auth.user && auth.user.is_admin;

                slots.forEach(slot => {
                    const timeKey = slot.start_time.substring(0, 5);
                    const slotIndex = TIME_SLOTS.findIndex(ts => ts.label.startsWith(timeKey));
                    if (slotIndex !== -1 && dayMap[slot.day] !== undefined) matrix[slotIndex][dayMap[slot.day]].push(slot);
                });

                const colorPalette = [
                    { bg: 'rgba(45,212,191,0.08)', border: 'rgba(45,212,191,0.25)', text: '#5eead4' },
                    { bg: 'rgba(139,92,246,0.08)', border: 'rgba(139,92,246,0.25)', text: '#c4b5fd' },
                    { bg: 'rgba(52,211,153,0.08)', border: 'rgba(52,211,153,0.25)', text: '#6ee7b7' },
                    { bg: 'rgba(244,114,182,0.08)', border: 'rgba(244,114,182,0.25)', text: '#f9a8d4' },
                    { bg: 'rgba(251,191,36,0.08)', border: 'rgba(251,191,36,0.25)', text: '#fde68a' },
                    { bg: 'rgba(56,189,248,0.08)', border: 'rgba(56,189,248,0.25)', text: '#7dd3fc' },
                ];

                matrix.forEach((row, i) => {
                    if (i === 2) {
                        tbody.innerHTML += `<tr><td class="py-2 text-center text-[10px] font-bold text-slate-600 tracking-[0.3em]" colspan="6">
                            ─── BREAK · 09:30 — 10:00 ───</td></tr>`;
                    }
                    let html = `<tr class="border-b border-white/[0.03] hover-row">
                        <td class="px-4 py-3 border-r border-white/[0.03] font-mono text-slate-500 text-xs align-top pt-4 whitespace-nowrap">${TIME_SLOTS[i].label}</td>`;

                    row.forEach((cellSlots, dayIdx) => {
                        const cellDay = dayKeys[dayIdx];
                        const dropAttrs = isAdmin ? `ondragover="app.handleDragOver(event)" ondragleave="app.handleDragLeave(event)" ondrop="app.handleDrop(event)"` : '';
                        html += `<td class="p-1 border-r border-white/[0.03] w-1/5 align-top" data-day="${cellDay}" data-slot-index="${i}" ${dropAttrs}>`;
                        if (cellSlots.length > 0) {
                            html += `<div class="flex flex-col gap-1">`;
                            cellSlots.forEach(cell => {
                                const c = colorPalette[cell.subject % colorPalette.length] || colorPalette[0];
                                const subName = cell.subject_name || `Subject ${cell.subject}`;
                                const roomName = cell.room_name || `Room ${cell.room}`;
                                const batchName = cell.batch_name || `Batch ${cell.batch}`;
                                const teacherName = cell.teacher_name || '';
                                const shortBatch = batchName.includes(' - Lab') ? batchName.split(' - ')[1] : batchName;
                                const isPinned = (app.state.pins || []).some(p => p.subject == cell.subject && p.day === cellDay && p.slot_index == i);
                                const dragAttrs = isAdmin && !isPinned ? `draggable="true" ondragstart="app.handleDragStart(event)" ondragend="app.handleDragEnd(event)"` : '';
                                const pinnedAttr = isPinned ? `data-pinned="true"` : '';
                                const pinBadge = isPinned ? `<span class="text-[9px] text-amber-400 ml-1" title="Fixed slot"><i class="fas fa-thumbtack"></i></span>` : '';
                                const editBtn = isAdmin && !isPinned ? `<button onclick="app.openEditSlotModal(${cell.id}, event)" class="absolute top-1 right-1 w-5 h-5 flex items-center justify-center text-slate-400 hover:text-white bg-black/20 hover:bg-black/40 rounded transition-colors opacity-0 group-hover:opacity-100"><i class="fas fa-ellipsis-v text-[10px]"></i></button>` : '';

                                html += `<div style="background:${c.bg};border:1px solid ${isPinned ? 'rgba(251,191,36,0.4)' : c.border}" class="tt-tile rounded-lg p-2.5 text-xs transition-all duration-300 hover:scale-[1.03] hover:shadow-lg relative group" data-slot-id="${cell.id}" data-day="${cellDay}" data-slot-index="${i}" ${dragAttrs} ${pinnedAttr}>
                                    ${editBtn}
                                    <div class="font-bold leading-tight pr-4 line-clamp-1" style="color:${c.text}">${subName}${pinBadge}</div>
                                    ${isAdmin && teacherName ? `<div class="text-[10px] text-slate-400 mt-1"><i class="fas fa-user mr-1 opacity-50"></i>${teacherName}</div>` : ''}
                                    <div class="text-[10px] text-slate-400 flex justify-between items-end mt-1.5">
                                        <span><i class="fas fa-door-open mr-1 opacity-40"></i>${roomName}</span>
                                        <span class="bg-black/20 px-1.5 py-0.5 rounded text-[9px] truncate max-w-[80px]">${shortBatch}</span>
                                    </div>
                                </div>`;
                                // Check for conflicts on this tile
                                const conflictSlotIds = (app.state.conflicts || []).flatMap(c => c.slot_ids);
                                if (conflictSlotIds.includes(cell.id)) {
                                    // We'll highlight after render
                                }
                            });
                            html += `</div>`;
                        }
                        html += `</td>`;
                    });
                    html += `</tr>`;
                    tbody.innerHTML += html;
                });
            },

            openModal: () => {
                if (!app.state.currentDept) return alert("Select Dept First");
                document.getElementById('add-modal').classList.remove('hidden');
                gsap.from("#add-modal > div", { y: 30, opacity: 0, scale: 0.95, duration: 0.4, ease: "back.out(1.4)" });
                const form = document.getElementById('add-form');
                const title = document.getElementById('modal-title');
                if (app.activeTab === 'teachers') {
                    title.textContent = "Add Faculty";
                    form.innerHTML = `
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.15em] mb-1 block">Name</label><input name="name" class="custom-input" placeholder="Dr. Smith" required></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.15em] mb-1 block">Email</label><input name="email" class="custom-input" placeholder="email@skilltech.edu"></div>
                        <div class="pt-4 border-t border-white/5"><label class="text-[10px] font-bold text-atlas-teal uppercase tracking-[0.15em] mb-1 block">Login Username</label><input name="username" class="custom-input" required></div>
                        <div><label class="text-[10px] font-bold text-atlas-teal uppercase tracking-[0.15em] mb-1 block">Login Password</label><input name="password" type="password" class="custom-input" required></div>
                        <button class="w-full btn-primary py-3 rounded-xl font-bold mt-2 text-white text-sm">Create Account</button>`;
                } else {
                    title.textContent = "Add Subject";
                    form.innerHTML = `
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.15em] mb-1 block">Name</label><input name="name" class="custom-input" placeholder="Physics" required></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.15em] mb-1 block">Code</label><input name="code" class="custom-input" placeholder="PHY101"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.15em] mb-1 block">Lectures/Week</label><input name="weekly_lectures" type="number" min="1" class="custom-input" value="3" required></div>
                        <button class="w-full btn-primary py-3 rounded-xl font-bold mt-2 text-white text-sm">Add Subject</button>`;
                }
            },
            closeModal: () => {
                gsap.to("#add-modal > div", {
                    y: 20, opacity: 0, scale: 0.95, duration: 0.2, ease: "power2.in",
                    onComplete: () => document.getElementById('add-modal').classList.add('hidden')
                });
            },

            submitAdd: async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const payload = Object.fromEntries(formData.entries());
                payload.department = app.state.currentDept;
                try {
                    const ep = app.activeTab === 'teachers' ? 'teachers' : 'subjects';
                    const res = await fetch(`${API_URL}/${ep}/`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Token ${auth.token}` }, body: JSON.stringify(payload) });
                    if (!res.ok) throw new Error("Failed");
                    app.closeModal(); app.refreshData();
                } catch (e) { alert("Error adding item"); }
            },

            deleteItem: async (type, id) => {
                if (!confirm("Delete?")) return;
                await fetch(`${API_URL}/${type}/${id}/`, { method: 'DELETE', headers: { 'Authorization': `Token ${auth.token}` } });
                app.refreshData();
            },

            saveChanges: async () => {
                const btn = document.getElementById('saveBtn'); btn.textContent = "Saving...";
                const updates = [];
                document.querySelectorAll('.sub-batch').forEach(el => {
                    const id = el.dataset.id;
                    updates.push(fetch(`${API_URL}/subjects/${id}/`, {
                        method: 'PATCH', headers: { 'Content-Type': 'application/json', 'Authorization': `Token ${auth.token}` },
                        body: JSON.stringify({ batch: el.value || null, teacher: document.querySelector(`.sub-teacher[data-id="${id}"]`).value || null, weekly_lectures: document.querySelector(`.sub-lectures[data-id="${id}"]`).value })
                    }));
                });
                document.querySelectorAll('.t-start').forEach(el => {
                    const id = el.dataset.id;
                    const maxDayEl = document.querySelector(`.t-maxday[data-id="${id}"]`);
                    updates.push(fetch(`${API_URL}/teachers/${id}/`, {
                        method: 'PATCH', headers: { 'Content-Type': 'application/json', 'Authorization': `Token ${auth.token}` },
                        body: JSON.stringify({ preferred_start_slot: el.value, preferred_end_slot: document.querySelector(`.t-end[data-id="${id}"]`).value, max_classes_per_day: maxDayEl ? maxDayEl.value : 4 })
                    }));
                });
                await Promise.all(updates); app.refreshData(); btn.textContent = "Save Changes";
            },

            runGeneration: async () => {
                if (!app.state.currentDept) return alert("Please select a department first.");
                const btn = document.getElementById('genBtn');
                const orig = btn.innerHTML;
                btn.innerHTML = '<div class="loader mx-auto"></div>';
                btn.disabled = true;
                try {
                    const res = await fetch(`${API_URL}/generate/`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Token ${auth.token}` }, body: JSON.stringify({ department_id: app.state.currentDept }) });
                    const data = await res.json();
                    if (!res.ok) {
                        if (data.messages) app.showDiagnostics(data.messages, data.status === 'infeasible');
                        else alert("Generation failed: " + (data.error || data.detail || JSON.stringify(data)));
                    } else {
                        if (data.messages && data.messages.length > 0) {
                            const hasWarnings = data.messages.some(m => m.includes('⚠️'));
                            if (hasWarnings || data.status === 'infeasible') {
                                app.showDiagnostics(data.messages, data.status === 'infeasible');
                            }
                        }
                        if (data.status === 'success') {
                            await app.refreshData();
                            // Auto-select first variant
                            if (app.state.variants.length > 0) {
                                app.selectVariant(app.state.variants[0].id);
                            }
                        }
                    }
                } catch (err) { alert("Network error: " + err.message); }
                finally { btn.innerHTML = orig; btn.disabled = false; }
            },

            // ═══ VARIANT SELECTOR ═══
            renderVariantSelector: () => {
                const container = document.getElementById('variant-selector');
                if (!container) return;
                if (app.state.variants.length === 0) {
                    container.innerHTML = '<p class="text-xs text-slate-600 text-center py-2">No timetables generated yet</p>';
                    return;
                }
                let html = '<div class="flex gap-2 flex-wrap">';
                app.state.variants.forEach(v => {
                    const isActive = v.id == app.state.currentVariant;
                    const isPublished = v.status === 'PUBLISHED';
                    const activeClass = isActive ? 'border-atlas-teal bg-atlas-teal/10 text-atlas-teal' : 'border-white/10 text-slate-400 hover:border-atlas-teal/30 hover:text-slate-200';
                    const badge = isPublished ? '<span class="ml-1 text-[8px] bg-green-500/20 text-green-400 px-1.5 py-0.5 rounded-full">LIVE</span>' : '';
                    html += `<button onclick="app.selectVariant(${v.id})" class="px-3 py-2 text-xs font-bold rounded-lg border transition-all ${activeClass}">
                        <i class="fas fa-${isPublished ? 'check-circle' : 'clock'} mr-1 text-[10px]"></i>V${v.variant_number}${badge}
                    </button>`;
                });
                html += '</div>';

                // Action buttons for selected variant
                const selected = app.state.variants.find(v => v.id == app.state.currentVariant);
                if (selected) {
                    html += '<div class="flex gap-2 mt-2">';
                    if (selected.status === 'DRAFT') {
                        html += `<button onclick="app.approveVariant(${selected.id})" class="flex-1 py-2 bg-green-500/10 border border-green-500/30 text-green-400 text-[10px] font-bold rounded-lg hover:bg-green-500/20 transition-all">
                            <i class="fas fa-check mr-1"></i>PUBLISH THIS
                        </button>`;
                    }
                    html += `<button onclick="app.downloadPdf(${selected.id})" class="flex-1 py-2 bg-white/[0.04] border border-white/10 text-slate-300 text-[10px] font-bold rounded-lg hover:bg-white/[0.08] transition-all">
                        <i class="fas fa-file-pdf mr-1"></i>EXPORT PDF
                    </button>`;
                    html += '</div>';
                }

                container.innerHTML = html;
            },

            selectVariant: (id) => {
                app.state.currentVariant = id;
                app.renderVariantSelector();
                app.refreshTimetable();
            },

            approveVariant: async (id) => {
                if (!confirm("Publish this variant? All other variants will be deleted.")) return;
                try {
                    const res = await fetch(`${API_URL}/timetables/${id}/approve/`, {
                        method: 'POST', headers: { 'Authorization': `Token ${auth.token}`, 'Content-Type': 'application/json' }
                    });

            highlightConflicts: () => {
                const conflictSlotIds = new Set(app.state.conflicts.flatMap(c => c.slot_ids));

                app.state.conflicts.forEach(c => { c.slot_ids.forEach(id => { conflictDetails[id] = (conflictDetails[id] || []).concat(c.detail); }); });

                    const id = parseInt(tile.dataset.slotId);
                    if (conflictSlotIds.has(id)) {
                        tile.style.border = '2px solid rgba(239,68,68,0.7)';
                        tile.style.animation = 'conflict-pulse 2s ease-in-out infinite';
                        const badge = document.createElement('div');
                        badge.className = 'text-[9px] text-red-400 mt-1';
                        badge.title = conflictDetails[id]?.join('\n') || 'Conflict';
                        badge.innerHTML = `<i class="fas fa-exclamation-triangle mr-1"></i>${conflictDetails[id]?.[0] || 'Conflict'}`;

            // ═══ DRAG & DROP ═══
            handleDragStart: (e) => {
                const tile = e.target.closest('.tt-tile');
                if (!tile) return;
                if (tile.dataset.pinned === 'true') {
                    e.preventDefault();
                    alert('📌 This is a fixed slot and cannot be moved.');
                    return;
                }
                tile.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', JSON.stringify({
                    slotId: tile.dataset.slotId,
                    day: tile.dataset.day,
                    slotIndex: tile.dataset.slotIndex
                }));
            },

            handleDragEnd: (e) => {
                const tile = e.target.closest('.tt-tile');
                if (tile) tile.classList.remove('dragging');
                document.querySelectorAll('td.drag-over').forEach(td => td.classList.remove('drag-over'));
            },

            handleDragOver: (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                const td = e.target.closest('td[data-day]');
                if (td && !td.classList.contains('drag-over')) td.classList.add('drag-over');
            },

            handleDragLeave: (e) => {
                const td = e.target.closest('td[data-day]');
                if (td) td.classList.remove('drag-over');
            },

            handleDrop: async (e) => {
                e.preventDefault();
                const td = e.target.closest('td[data-day]');
                if (!td) return;
                td.classList.remove('drag-over');

                let dragData;
                try { dragData = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }

                const targetDay = td.dataset.day;
                const targetSlotIndex = parseInt(td.dataset.slotIndex);
                const srcSlotId = dragData.slotId;

                // Dropped on same cell?
                if (dragData.day === targetDay && parseInt(dragData.slotIndex) === targetSlotIndex) return;

                // Is there a tile in the target cell?
                const targetTile = td.querySelector('.tt-tile');
                if (targetTile) {
                    if (targetTile.dataset.pinned === 'true') {
                        alert('📌 Cannot swap with a fixed slot.');
                        return;
                    }
                    // Swap with target tile
                    const targetSlotId = targetTile.dataset.slotId;
                    await app.swapSlots(srcSlotId, targetSlotId);
                } else {
                    // Move to empty cell
                    await app.moveSlot(srcSlotId, targetDay, targetSlotIndex);
                }

                td.classList.add('drop-success');
                setTimeout(() => td.classList.remove('drop-success'), 600);
            },

            swapSlots: async (slotAId, slotBId) => {
                try {
                    const res = await fetch(`${API_URL}/slots/swap/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Token ${auth.token}` },
                        body: JSON.stringify({ slot_a_id: slotAId, slot_b_id: slotBId })
                    });
                    const data = await res.json();
                    if (!res.ok) { alert(data.error || 'Swap failed'); return; }
                    await app.refreshTimetable();
                } catch (err) { alert('Swap error: ' + err.message); }
            },

            moveSlot: async (slotId, targetDay, targetSlotIndex) => {
                try {
                    const res = await fetch(`${API_URL}/slots/swap/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Token ${auth.token}` },
                        body: JSON.stringify({ slot_id: slotId, target_day: targetDay, target_slot_index: targetSlotIndex })
                    });
                    const data = await res.json();
                    if (!res.ok) { alert(data.error || 'Move failed'); return; }
                    await app.refreshTimetable();
                } catch (err) { alert('Move error: ' + err.message); }
            },

                const roomId = document.getElementById('edit-slot-room').value;
                
                const btn = e.target.querySelector('button[type="submit"]');
                const prevText = btn.textContent;
                btn.textContent = 'Saving...';
                btn.disabled = true;
                
                try {
                    const res = await fetch(`${API_URL}/slots/${slotId}/`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Token ${auth.token}` },
                        body: JSON.stringify({ subject: subjectId, teacher: teacherId, room: roomId })
                    });
                    
                    if (!res.ok) {
                        const data = await res.json();
                        throw new Error(data.error || "Failed to update class");

                    app.closeEditSlotModal();
